apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-svc
  namespace: {{ .Values.http.namespace }}
spec:
  type: {{ .Values.http.serviceType | default "ClusterIP" }}
  selector:
    app: {{ .Release.Name }}
  ports:
    - protocol: TCP
      port: {{ .Values.http.port }}
      targetPort: {{ .Values.http.port }}