apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-python
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/thiagotw10/meu-lab-gitops.git'
    targetRevision: HEAD
    path: charts/nestjs-app # <-- USANDO O MESMO ESQUELETO!
    helm:
      valueFiles:
        - ../../applications/backend-python/values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true